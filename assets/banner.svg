<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-label="Telegram MCP for Claude">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.55" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="320" rx="20" fill="url(#bg)"/>

  <!-- paper-plane motif -->
  <g transform="translate(110,160)" filter="url(#soft)">
    <circle r="86" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.35"/>
    <path d="M -52 -8 L 60 -44 L 24 56 L 6 16 L -52 -8 Z" fill="url(#accent)"/>
    <path d="M 6 16 L 60 -44 L 14 6 Z" fill="#0b1220" opacity="0.55"/>
  </g>

  <text x="250" y="150" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="62" font-weight="700" fill="#f8fafc">Telegram MCP</text>
  <text x="250" y="218" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="44" font-weight="600" fill="url(#accent)">for Claude</text>
  <text x="254" y="266" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" fill="#94a3b8">Let Claude read, post, pin, react &amp; share files in a Telegram group</text>
</svg>
